name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create placeholder icon
        if: ${{ !hashFiles('resources/icon.ico') }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources | Out-Null
          Add-Type -AssemblyName System.Drawing
          $bmp = New-Object System.Drawing.Bitmap(256, 256)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.Clear([System.Drawing.Color]::FromArgb(99, 102, 241))
          $g.Dispose()
          $icon = [System.Drawing.Icon]::FromHandle($bmp.GetHicon())
          $fs = New-Object System.IO.FileStream("resources/icon.ico", [System.IO.FileMode]::Create)
          $icon.Save($fs)
          $fs.Close()
          $icon.Dispose()
          $bmp.Dispose()

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PDFDecomposer-Setup
          path: dist/PDFDecomposer-Setup-*.exe
          if-no-files-found: error

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: PDFDecomposer-Portable
          path: dist/PDFDecomposer-portable.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PDFDecomposer-Setup-*.exe
            dist/PDFDecomposer-portable.exe
          generate_release_notes: true
